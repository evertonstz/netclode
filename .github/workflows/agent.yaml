name: Agent Image

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "apps/agent/**"
      - "infra/nixos/agent/**"
      - "packages/**"
      - ".github/workflows/agent.yaml"
  pull_request:
    branches: [main, master]
    paths:
      - "apps/agent/**"
      - "infra/nixos/agent/**"
      - "packages/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/netclode-agent

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-24.11
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: netclode
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
        continue-on-error: true

      - name: Build agent OCI image
        run: |
          cd infra/nixos
          nix build .#agent-image -o result

      - name: Login to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.event_name != 'pull_request'
        run: |
          # Install skopeo
          nix profile install nixpkgs#skopeo

          # Push with latest tag
          skopeo copy \
            docker-archive:infra/nixos/result \
            docker://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

          # Push with SHA tag
          skopeo copy \
            docker-archive:infra/nixos/result \
            docker://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
