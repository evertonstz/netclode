name: iOS Tests

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "clients/ios/**"
      - ".github/workflows/ios.yaml"
  pull_request:
    branches: [main, master]
    paths:
      - "clients/ios/**"

jobs:
  test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build and Test
        working-directory: clients/ios
        run: |
          xcodebuild test \
            -scheme NetclodeTests \
            -destination 'platform=macOS' \
            -resultBundlePath TestResults.xcresult \
            | xcbeautify

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: clients/ios/TestResults.xcresult
