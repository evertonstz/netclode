---
k3s_cluster:
  children:
    server:
      hosts:
        netclode:
          ansible_host: 161.35.214.216
          ansible_user: root
    agent:
      hosts: {}

  vars:
    k3s_version: v1.34.3+k3s1
    api_endpoint: "{{ hostvars[groups['server'][0]]['ansible_host'] | default(groups['server'][0]) }}"
    # Disable built-in components we don't need
    extra_server_args: >-
      --disable=traefik
      --disable=servicelb
      --disable=local-storage
      --flannel-backend=none
      --disable-network-policy

# For non-k3s plays (tailscale, base setup)
all:
  children:
    k3s_cluster:
