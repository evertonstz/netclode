---
# Fetch kubeconfig from remote server for local kubectl access
#
# Usage:
#   ansible-playbook playbooks/fetch-kubeconfig.yaml
#
# This adds/updates the "netclode" context in ~/.kube/config

- name: Fetch kubeconfig
  hosts: all
  become: yes
  gather_facts: no
  vars_files:
    - ../group_vars/all.yaml

  tasks:
    - name: Read remote kubeconfig
      ansible.builtin.slurp:
        src: "{{ k3s_kubeconfig }}"
      register: remote_kubeconfig

    - name: Ensure ~/.kube directory exists
      ansible.builtin.file:
        path: "{{ lookup('env', 'HOME') }}/.kube"
        state: directory
        mode: "0700"
      delegate_to: localhost
      become: no

    - name: Write temporary netclode kubeconfig
      ansible.builtin.template:
        src: ../templates/kubeconfig.yaml.j2
        dest: "{{ lookup('env', 'HOME') }}/.kube/netclode.yaml"
        mode: "0600"
      delegate_to: localhost
      become: no
      vars:
        kubeconfig: "{{ remote_kubeconfig.content | b64decode | from_yaml }}"
        server_url: "https://{{ netclode_hostname }}:6443"

    - name: Check if main kubeconfig exists
      ansible.builtin.stat:
        path: "{{ lookup('env', 'HOME') }}/.kube/config"
      delegate_to: localhost
      become: no
      register: main_kubeconfig

    - name: Remove old netclode entries from main kubeconfig
      ansible.builtin.shell: |
        kubectl config unset clusters.netclode 2>/dev/null || true
        kubectl config unset contexts.netclode 2>/dev/null || true
        kubectl config unset users.netclode 2>/dev/null || true
      delegate_to: localhost
      become: no
      when: main_kubeconfig.stat.exists

    - name: Merge netclode context into main kubeconfig
      ansible.builtin.shell: |
        export KUBECONFIG="{{ lookup('env', 'HOME') }}/.kube/config:{{ lookup('env', 'HOME') }}/.kube/netclode.yaml"
        kubectl config view --flatten > "{{ lookup('env', 'HOME') }}/.kube/config.merged"
        mv "{{ lookup('env', 'HOME') }}/.kube/config.merged" "{{ lookup('env', 'HOME') }}/.kube/config"
        chmod 600 "{{ lookup('env', 'HOME') }}/.kube/config"
      delegate_to: localhost
      become: no
      when: main_kubeconfig.stat.exists

    - name: Use netclode.yaml as main config if no existing config
      ansible.builtin.copy:
        src: "{{ lookup('env', 'HOME') }}/.kube/netclode.yaml"
        dest: "{{ lookup('env', 'HOME') }}/.kube/config"
        mode: "0600"
      delegate_to: localhost
      become: no
      when: not main_kubeconfig.stat.exists

    - name: Display usage instructions
      ansible.builtin.debug:
        msg: |
          Kubeconfig merged into ~/.kube/config with context "netclode"
          
          Usage:
            kubectl --context netclode get nodes
            kubectl --context netclode -n netclode get pods
