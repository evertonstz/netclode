---
- name: Configure base system
  hosts: all
  become: true

  pre_tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install base packages
      apt:
        name:
          - curl
          - wget
          - git
          - htop
          - vim
          - jq
          - unzip
          - ca-certificates
          - gnupg
          - locales
          - python3-kubernetes
          - python3-yaml
        state: present

    - name: Generate locale
      locale_gen:
        name: en_US.UTF-8
        state: present

    - name: Ensure br_netfilter loads on boot
      copy:
        content: "br_netfilter"
        dest: /etc/modules-load.d/br_netfilter.conf

    - name: Load br_netfilter module
      modprobe:
        name: br_netfilter
        state: present

    - name: Configure sysctl for k8s
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/99-kubernetes.conf
        reload: yes
      loop:
        - { name: 'net.ipv4.ip_forward', value: '1' }
        - { name: 'net.bridge.bridge-nf-call-iptables', value: '1' }
        - { name: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }

    - name: Check if Helm is installed
      ansible.builtin.stat:
        path: /usr/local/bin/helm
      register: helm_installed

    - name: Install Helm from GitHub
      when: not helm_installed.stat.exists
      block:
        - name: Download Helm
          ansible.builtin.get_url:
            url: https://get.helm.sh/helm-v3.17.0-linux-amd64.tar.gz
            dest: /tmp/helm.tar.gz
            mode: "0644"

        - name: Extract Helm
          ansible.builtin.unarchive:
            src: /tmp/helm.tar.gz
            dest: /tmp
            remote_src: true

        - name: Install Helm binary
          ansible.builtin.copy:
            src: /tmp/linux-amd64/helm
            dest: /usr/local/bin/helm
            mode: "0755"
            remote_src: true

        - name: Cleanup
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop:
            - /tmp/helm.tar.gz
            - /tmp/linux-amd64

# Install k3s (simple direct install)
- name: Install k3s
  hosts: all
  become: true
  gather_facts: false
  roles:
    - k3s

# Install Cilium CNI via Helm
- name: Install Cilium
  hosts: all
  become: true
  gather_facts: false
  vars:
    cilium_chart_version: "1.16.5"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  tasks:
    - name: Add Cilium Helm repository
      kubernetes.core.helm_repository:
        name: cilium
        repo_url: https://helm.cilium.io/

    - name: Install Cilium Helm chart
      kubernetes.core.helm:
        name: cilium
        chart_ref: cilium/cilium
        chart_version: "{{ cilium_chart_version }}"
        release_namespace: kube-system
        create_namespace: false
        wait: true
        wait_timeout: 5m
        values:
          ipam:
            operator:
              clusterPoolIPv4PodCIDRList:
                - "10.42.0.0/16"
          operator:
            replicas: 1
          kubeProxyReplacement: true

# Install agent-sandbox CRDs
- name: Install agent-sandbox
  hosts: all
  become: true
  gather_facts: false
  vars:
    agent_sandbox_version: "v0.1.0"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  tasks:
    - name: Install agent-sandbox manifest
      kubernetes.core.k8s:
        state: present
        src: "https://github.com/kubernetes-sigs/agent-sandbox/releases/download/{{ agent_sandbox_version }}/manifest.yaml"

    - name: Install agent-sandbox extensions
      kubernetes.core.k8s:
        state: present
        src: "https://github.com/kubernetes-sigs/agent-sandbox/releases/download/{{ agent_sandbox_version }}/extensions.yaml"

    - name: Wait for Sandbox CRD to be established
      kubernetes.core.k8s_info:
        api_version: apiextensions.k8s.io/v1
        kind: CustomResourceDefinition
        name: sandboxes.agents.x-k8s.io
        wait: true
        wait_condition:
          type: Established
          status: "True"
        wait_timeout: 60

# Install Kata Containers with Firecracker support
- name: Install Kata Containers
  hosts: all
  become: true
  gather_facts: false
  roles:
    - kata

# Configure Kata RuntimeClasses in Kubernetes
- name: Configure Kata RuntimeClasses
  hosts: all
  become: true
  gather_facts: false
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  tasks:
    - name: Include Kata RuntimeClass tasks
      ansible.builtin.include_role:
        name: kata
        tasks_from: runtimeclass

# Install Nix daemon
- name: Install Nix
  hosts: all
  become: true
  gather_facts: false
  roles:
    - nix

# Install JuiceFS CSI Driver (DigitalOcean Spaces backend)
- name: Install JuiceFS
  hosts: all
  become: true
  gather_facts: false
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  roles:
    - role: juicefs
      vars:
        juicefs_spaces_access_key: "{{ lookup('env', 'DO_SPACES_ACCESS_KEY') }}"
        juicefs_spaces_secret_key: "{{ lookup('env', 'DO_SPACES_SECRET_KEY') }}"
      when: lookup('env', 'DO_SPACES_ACCESS_KEY') != ''

# Install Tailscale
- name: Install Tailscale
  hosts: all
  become: true
  gather_facts: false
  roles:
    - role: tailscale
      vars:
        tailscale_authkey: "{{ lookup('env', 'TAILSCALE_AUTHKEY') }}"
        tailscale_args: "--ssh"
      when: lookup('env', 'TAILSCALE_AUTHKEY') != ''
