---
# Deploy Netclode to k3s cluster with Kata Firecracker
#
# Usage: ansible-playbook -i inventory/hosts.yml playbooks/deploy-netclode.yml
#
# Required env vars:
#   ANTHROPIC_API_KEY - Claude API key
#
# Optional env vars:
#   SKIP_IMAGE_BUILD - Skip building sandbox image (use existing)
#   REGISTRY - Container registry (default: ghcr.io/netclode)
#   IMAGE_TAG - Image tag (default: latest)

# ============================================================================
# Phase 1: Build sandbox VM image on server (requires Linux + Nix)
# ============================================================================
- name: Build sandbox VM image
  hosts: all
  become: true
  vars:
    sandbox_build_dir: /tmp/netclode-sandbox-build
    skip_build: "{{ lookup('env', 'SKIP_IMAGE_BUILD') | default('false', true) | bool }}"

  tasks:
    - name: Skip build if requested
      meta: end_play
      when: skip_build

    - name: Check if nix is installed on server
      command: which nix
      register: nix_check
      failed_when: false
      changed_when: false

    - name: Install Nix on server if not present
      shell: |
        curl -L https://nixos.org/nix/install | sh -s -- --daemon --yes
      when: nix_check.rc != 0
      args:
        creates: /nix/var/nix/profiles/default/bin/nix

    - name: Copy sandbox flake to server
      synchronize:
        src: "{{ playbook_dir }}/../../../infra/nixos/sandbox/"
        dest: "{{ sandbox_build_dir }}/"
        delete: yes

    - name: Create apps directory for agent overlay
      file:
        path: "{{ sandbox_build_dir }}/apps"
        state: directory
        mode: "0755"

    - name: Copy agent source for overlay
      synchronize:
        src: "{{ playbook_dir }}/../../../apps/agent/"
        dest: "{{ sandbox_build_dir }}/apps/agent/"
        delete: yes
        rsync_opts:
          - "--exclude=node_modules"

    - name: Build sandbox image (raw for Firecracker)
      shell: |
        export PATH="/nix/var/nix/profiles/default/bin:$PATH"
        cd {{ sandbox_build_dir }}
        nix build .#raw -o result \
          --extra-experimental-features 'nix-command flakes' \
          --impure \
          --no-link --print-out-paths
      register: build_result
      args:
        executable: /bin/bash

    - name: Set image path fact
      set_fact:
        sandbox_image_path: "{{ build_result.stdout_lines[-1] }}/nixos.img"
      when: build_result.rc == 0

    - name: Display build result
      debug:
        msg: "Built sandbox image: {{ sandbox_image_path | default('failed') }}"

# ============================================================================
# Phase 2: Deploy infrastructure to nodes
# ============================================================================
- name: Deploy Netclode infrastructure
  hosts: all
  become: true
  vars:
    sandbox_build_dir: /tmp/netclode-sandbox-build
    kata_image_dir: /var/lib/kata/images
    kata_config_dir: /opt/kata/share/defaults/kata-containers
    sandbox_image_name: netclode-sandbox.img
    skip_build: "{{ lookup('env', 'SKIP_IMAGE_BUILD') | default('false', true) | bool }}"
    kubeconfig_path: /etc/rancher/k3s/k3s.yaml

  tasks:
    # --- Sandbox Image Deployment ---
    - name: Create Kata images directory
      file:
        path: "{{ kata_image_dir }}"
        state: directory
        mode: "0755"

    - name: Copy built sandbox image to Kata directory
      copy:
        src: "{{ sandbox_image_path }}"
        dest: "{{ kata_image_dir }}/{{ sandbox_image_name }}"
        mode: "0644"
        remote_src: yes
      when: sandbox_image_path is defined and not skip_build

    - name: Check sandbox image exists
      stat:
        path: "{{ kata_image_dir }}/{{ sandbox_image_name }}"
      register: sandbox_image_stat

    - name: Warn if sandbox image missing (continuing without Kata)
      debug:
        msg: "WARNING: Sandbox image not found. Kata runtime won't work. Set SKIP_IMAGE_BUILD=false to build."
      when: not sandbox_image_stat.stat.exists

    # --- Kata Configuration ---
    - name: Ensure Kata config directory exists
      file:
        path: "{{ kata_config_dir }}"
        state: directory
        mode: "0755"

    - name: Configure Kata Firecracker image path
      lineinfile:
        path: "{{ kata_config_dir }}/configuration-fc.toml"
        regexp: '^image\s*='
        line: 'image = "{{ kata_image_dir }}/{{ sandbox_image_name }}"'
        insertafter: '^\[hypervisor\.firecracker\]'
        create: no
      notify: Restart containerd
      ignore_errors: yes  # File might not exist yet if Kata not installed

    - name: Label node for Kata runtime
      command: >
        kubectl label node {{ ansible_hostname }}
        katacontainers.io/kata-runtime=true
        --overwrite
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      changed_when: true

    # --- RuntimeClass ---
    - name: Copy RuntimeClass manifest
      copy:
        src: "{{ playbook_dir }}/../../../infra/nixos/manifests/kata-runtimeclass.yaml"
        dest: /tmp/kata-runtimeclass.yaml

    - name: Apply RuntimeClass
      command: kubectl apply -f /tmp/kata-runtimeclass.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

  handlers:
    - name: Restart containerd
      systemd:
        name: k3s
        state: restarted

# ============================================================================
# Phase 3: Deploy Netclode application to k8s
# ============================================================================
- name: Deploy Netclode application
  hosts: all
  become: true
  vars:
    registry: "{{ lookup('env', 'REGISTRY') | default('docker.io/netclode', true) }}"
    image_tag: "{{ lookup('env', 'IMAGE_TAG') | default('latest', true) }}"
    anthropic_api_key: "{{ lookup('env', 'ANTHROPIC_API_KEY') }}"
    netclode_namespace: netclode
    kubeconfig_path: /etc/rancher/k3s/k3s.yaml

  tasks:
    - name: Fail if ANTHROPIC_API_KEY not set
      fail:
        msg: "ANTHROPIC_API_KEY environment variable is required"
      when: anthropic_api_key == ''

    # --- Namespace ---
    - name: Create netclode namespace
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ netclode_namespace }}"

    # --- Secrets ---
    - name: Create Anthropic credentials secret
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: anthropic-credentials
            namespace: "{{ netclode_namespace }}"
          type: Opaque
          stringData:
            ANTHROPIC_API_KEY: "{{ anthropic_api_key }}"

    # --- K8s Manifests ---
    - name: Copy k8s manifests
      copy:
        src: "{{ playbook_dir }}/../../../infra/k8s/"
        dest: /tmp/netclode-k8s/
        mode: "0644"

    - name: Apply control-plane manifests
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        src: /tmp/netclode-k8s/control-plane.yaml

    - name: Apply agent sandbox template
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        src: /tmp/netclode-k8s/agent-sandbox-template.yaml

    # --- Update images ---
    - name: Patch control-plane deployment with image
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: control-plane
            namespace: "{{ netclode_namespace }}"
          spec:
            template:
              spec:
                containers:
                  - name: control-plane
                    image: "{{ registry }}/control-plane:{{ image_tag }}"

    # --- Wait for ready ---
    - name: Wait for control-plane deployment
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig_path }}"
        kind: Deployment
        name: control-plane
        namespace: "{{ netclode_namespace }}"
      register: deployment
      until: >-
        deployment.resources | length > 0 and
        deployment.resources[0].status.readyReplicas is defined and
        deployment.resources[0].status.readyReplicas == deployment.resources[0].spec.replicas
      retries: 30
      delay: 10

    # --- Tailscale exposure (optional) ---
    - name: Create Tailscale service
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: control-plane-tailscale
            namespace: "{{ netclode_namespace }}"
            annotations:
              tailscale.com/hostname: netclode
          spec:
            type: LoadBalancer
            loadBalancerClass: tailscale
            ports:
              - port: 80
                targetPort: 3001
                name: http
            selector:
              app: control-plane
      when: lookup('env', 'ENABLE_TAILSCALE') | default('true', true) | bool

    # --- Output ---
    - name: Get service info
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig_path }}"
        kind: Service
        name: control-plane
        namespace: "{{ netclode_namespace }}"
      register: service_info

    - name: Deployment complete
      debug:
        msg: |
          ============================================
          Netclode deployed successfully!
          ============================================

          Control Plane: {{ service_info.resources[0].spec.clusterIP }}:3001

          Access methods:
            - kubectl port-forward -n netclode svc/control-plane 3001:3001
            - http://netclode.your-tailnet.ts.net (if Tailscale enabled)

          Test sandbox:
            kubectl run test-kata --rm -it --restart=Never \
              --runtime-class=kata-fc \
              --image=busybox -- sh

          Logs:
            kubectl logs -n netclode -l app=control-plane -f
          ============================================
