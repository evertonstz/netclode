---
# Build Netclode container images on server for k3s
# Usage: ansible-playbook -i inventory/hosts.yml playbooks/build-images.yml

- name: Build Netclode container images
  hosts: all
  become: true
  vars:
    app_dir: /opt/netclode-build
    image_prefix: "netclode"
    image_tag: "latest"

  tasks:
    - name: Install rsync first (needed for synchronize)
      raw: apt-get update && apt-get install -y rsync
      changed_when: true

    - name: Install build dependencies
      apt:
        name:
          - git
          - curl
          - unzip
          - docker.io
        state: present

    - name: Ensure docker is running
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Check if Bun is installed
      stat:
        path: /root/.bun/bin/bun
      register: bun_stat

    - name: Install Bun
      shell: curl -fsSL https://bun.sh/install | bash
      when: not bun_stat.stat.exists
      environment:
        HOME: /root

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: "0755"

    - name: Sync application code
      synchronize:
        src: "{{ playbook_dir }}/../../../"
        dest: "{{ app_dir }}/"
        delete: yes
        rsync_opts:
          - "--exclude=node_modules"
          - "--exclude=.git"
          - "--exclude=infra/nixos/sandbox/result"
          - "--exclude=dist"

    - name: Install dependencies
      command: /root/.bun/bin/bun install
      args:
        chdir: "{{ app_dir }}"

    - name: Build packages
      command: /root/.bun/bin/bun run build
      args:
        chdir: "{{ app_dir }}"
      ignore_errors: yes  # May fail if no build script in root

    # Build images with docker and import into k3s
    - name: Create control-plane Dockerfile
      copy:
        dest: /tmp/Dockerfile.control-plane
        content: |
          FROM oven/bun:latest
          WORKDIR /app
          COPY package.json ./
          COPY packages ./packages
          COPY apps/control-plane ./apps/control-plane
          RUN bun install
          WORKDIR /app/apps/control-plane
          EXPOSE 3001
          CMD ["bun", "run", "src/index.ts"]

    - name: Build control-plane image
      command: docker build -t {{ image_prefix }}/control-plane:{{ image_tag }} -f /tmp/Dockerfile.control-plane .
      args:
        chdir: "{{ app_dir }}"

    # Agent runs inside NixOS Kata VM, not as Docker container
    # Only control-plane needs a Docker image

    - name: Save control-plane image to tar
      command: docker save {{ image_prefix }}/control-plane:{{ image_tag }} -o /tmp/control-plane.tar

    - name: Import control-plane image into k3s
      command: k3s ctr images import /tmp/control-plane.tar

    - name: Verify images in k3s
      command: k3s ctr images list
      register: images_list

    - name: Display images
      debug:
        msg: |
          Control-plane image built and imported to k3s:
            - {{ image_prefix }}/control-plane:{{ image_tag }}

          Agent runs inside NixOS Kata VM (no Docker image needed)
