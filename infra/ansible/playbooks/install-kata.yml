---
# Install Kata Containers with Firecracker support
# Usage: ansible-playbook -i inventory/hosts.yml playbooks/install-kata.yml

- name: Install Kata Containers
  hosts: all
  become: true
  gather_facts: false
  roles:
    - kata

- name: Configure Kata RuntimeClasses
  hosts: all
  become: true
  gather_facts: false
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  tasks:
    - name: Include Kata RuntimeClass tasks
      ansible.builtin.include_role:
        name: kata
        tasks_from: runtimeclass
