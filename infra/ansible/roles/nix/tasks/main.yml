---
- name: Check if Nix is already installed
  ansible.builtin.stat:
    path: /nix/var/nix/profiles/default/bin/nix
  register: nix_installed

- name: Install Nix using DeterminateSystems installer
  when: not nix_installed.stat.exists
  block:
    - name: Download DeterminateSystems Nix installer
      ansible.builtin.get_url:
        url: https://install.determinate.systems/nix
        dest: /tmp/nix-installer.sh
        mode: "0755"

    - name: Run Nix installer
      ansible.builtin.command:
        cmd: /tmp/nix-installer.sh install --no-confirm
      environment:
        NIX_INSTALLER_DIAGNOSTIC_ENDPOINT: ""
      register: nix_install_result
      changed_when: true

    - name: Remove installer script
      ansible.builtin.file:
        path: /tmp/nix-installer.sh
        state: absent

- name: Ensure Nix daemon is running
  ansible.builtin.systemd:
    name: nix-daemon
    state: started
    enabled: true

- name: Add extra Nix configuration
  ansible.builtin.blockinfile:
    path: /etc/nix/nix.conf
    block: "{{ nix_extra_config }}"
    marker: "# {mark} ANSIBLE MANAGED BLOCK"
    create: true
    mode: "0644"
  notify: Restart nix-daemon

- name: Verify Nix installation
  ansible.builtin.command:
    cmd: /nix/var/nix/profiles/default/bin/nix --version
  register: nix_version
  changed_when: false

- name: Display Nix version
  ansible.builtin.debug:
    msg: "{{ nix_version.stdout }}"
