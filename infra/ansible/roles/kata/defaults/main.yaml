---
# Kata Containers defaults
kata_version: "3.24.0"
kata_dir: /opt/kata

# VM resource defaults (can be overridden via .env)
kata_vm_cpus: 4
kata_vm_memory_mb: 4096

# Memory optimization settings
# virtio-mem allows dynamic memory resize (grow/shrink based on demand)
kata_enable_virtio_mem: true
# Reclaim memory freed by containers via balloon device
kata_reclaim_guest_freed_memory: true

# Security hardening
# Rootless mode (run CLH as non-root) requires additional setup and doesn't
# work out of the box - disabled for now.
kata_rootless: false
# Apply container seccomp profiles inside the VM (defense in depth)
kata_enable_guest_seccomp: true

# virtiofs performance tuning
# Queue size controls max in-flight I/O requests (higher = better parallel I/O)
kata_virtio_fs_queue_size: 2048
# Thread pool for virtiofsd (more threads = better parallel I/O handling)
kata_virtio_fs_thread_pool_size: 4
