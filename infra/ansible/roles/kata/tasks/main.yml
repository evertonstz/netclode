---
- name: Check if Kata is already installed
  ansible.builtin.stat:
    path: "{{ kata_install_dir }}/bin/kata-runtime"
  register: kata_installed

- name: Install Kata Containers
  when: not kata_installed.stat.exists
  block:
    - name: Install zstd for extraction
      ansible.builtin.apt:
        name: zstd
        state: present

    - name: Download Kata static release
      ansible.builtin.get_url:
        url: "https://github.com/kata-containers/kata-containers/releases/download/{{ kata_version }}/kata-static-{{ kata_version }}-amd64.tar.zst"
        dest: "/tmp/kata-static.tar.zst"
        mode: "0644"

    - name: Extract Kata binaries
      ansible.builtin.shell:
        cmd: "zstdcat /tmp/kata-static.tar.zst | tar -xvf - -C /"
        creates: "{{ kata_install_dir }}/bin/kata-runtime"

    - name: Remove downloaded archive
      ansible.builtin.file:
        path: "/tmp/kata-static.tar.zst"
        state: absent

- name: Create symlinks for Kata binaries
  ansible.builtin.file:
    src: "{{ kata_install_dir }}/bin/{{ item }}"
    dest: "{{ kata_bin_dir }}/{{ item }}"
    state: link
  loop:
    - kata-runtime
    - containerd-shim-kata-v2

- name: Create Firecracker shim wrapper
  ansible.builtin.copy:
    dest: "{{ kata_bin_dir }}/containerd-shim-kata-fc-v2"
    mode: "0755"
    content: |
      #!/bin/bash
      KATA_CONF_FILE={{ kata_install_dir }}/share/defaults/kata-containers/configuration-fc.toml \
        {{ kata_install_dir }}/bin/containerd-shim-kata-v2 "$@"

- name: Create containerd config directory
  ansible.builtin.file:
    path: "{{ kata_containerd_config_dir }}"
    state: directory
    mode: "0755"

- name: Configure containerd for Kata with devmapper (k3s)
  ansible.builtin.template:
    src: containerd-config.toml.j2
    dest: "{{ kata_containerd_config_dir }}/config.toml.tmpl"
    mode: "0644"
  notify: Restart containerd

- name: Verify Kata installation
  ansible.builtin.command:
    cmd: "{{ kata_install_dir }}/bin/kata-runtime --version"
  register: kata_version_check
  changed_when: false

- name: Display Kata version
  ansible.builtin.debug:
    msg: "{{ kata_version_check.stdout }}"
