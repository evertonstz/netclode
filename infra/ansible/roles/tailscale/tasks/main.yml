---
- name: Check if Tailscale is installed
  ansible.builtin.stat:
    path: /usr/bin/tailscale
  register: tailscale_binary

- name: Install Tailscale
  when: not tailscale_binary.stat.exists
  block:
    - name: Add Tailscale signing key
      ansible.builtin.get_url:
        url: https://pkgs.tailscale.com/stable/debian/bookworm.noarmor.gpg
        dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
        mode: "0644"

    - name: Add Tailscale repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/debian bookworm main"
        filename: tailscale
        state: present

    - name: Install Tailscale package
      ansible.builtin.apt:
        name: tailscale
        state: present
        update_cache: true

- name: Ensure Tailscale service is running
  ansible.builtin.systemd:
    name: tailscaled
    state: started
    enabled: true

- name: Check Tailscale status
  ansible.builtin.command: tailscale status --json
  register: tailscale_status
  changed_when: false
  failed_when: false

- name: Authenticate Tailscale
  ansible.builtin.command: "tailscale up --authkey={{ tailscale_authkey }} {{ tailscale_args | default('') }}"
  when:
    - tailscale_authkey is defined
    - tailscale_authkey | length > 0
    - (tailscale_status.stdout | from_json).BackendState != "Running" or not (tailscale_status.stdout | from_json).Self.Online
  no_log: true
  changed_when: true
