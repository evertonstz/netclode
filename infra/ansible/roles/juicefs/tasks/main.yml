---
- name: Add JuiceFS Helm repository
  kubernetes.core.helm_repository:
    name: juicefs
    repo_url: https://juicedata.github.io/charts/

- name: Install JuiceFS CSI Driver
  kubernetes.core.helm:
    name: juicefs-csi-driver
    chart_ref: juicefs/juicefs-csi-driver
    chart_version: "{{ juicefs_csi_version | default(omit) }}"
    release_namespace: kube-system
    create_namespace: false
    wait: true
    wait_timeout: 10m

- name: Create JuiceFS secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: juicefs-secret
        namespace: kube-system
      type: Opaque
      stringData:
        name: "{{ juicefs_volume_name }}"
        metaurl: "{{ juicefs_redis_url if juicefs_metadata_type == 'redis' else 'sqlite3://' + juicefs_sqlite_path }}"
        storage: s3
        bucket: "{{ juicefs_spaces_endpoint }}/{{ juicefs_spaces_bucket }}"
        access-key: "{{ juicefs_spaces_access_key }}"
        secret-key: "{{ juicefs_spaces_secret_key }}"

- name: Create JuiceFS StorageClass
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: storage.k8s.io/v1
      kind: StorageClass
      metadata:
        name: "{{ juicefs_storage_class_name }}"
        annotations: "{{ {'storageclass.kubernetes.io/is-default-class': 'true'} if juicefs_storage_class_default else {} }}"
      provisioner: csi.juicefs.com
      reclaimPolicy: Delete
      volumeBindingMode: Immediate
      parameters:
        csi.storage.k8s.io/provisioner-secret-name: juicefs-secret
        csi.storage.k8s.io/provisioner-secret-namespace: kube-system
        csi.storage.k8s.io/node-publish-secret-name: juicefs-secret
        csi.storage.k8s.io/node-publish-secret-namespace: kube-system
