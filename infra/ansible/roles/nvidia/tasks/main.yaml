---
# NVIDIA role - Driver, Container Toolkit, and K8s Device Plugin
#
# Installs:
# 1. NVIDIA driver (570+ for RTX 50 series Blackwell support)
# 2. NVIDIA Container Toolkit (for container GPU access)
# 3. Configures K3s containerd for nvidia runtime
# 4. Deploys NVIDIA Device Plugin for K8s GPU scheduling
#
# Control via environment variable:
#   NVIDIA_ENABLED=false ansible-playbook playbooks/site.yaml

# =============================================================================
# Prerequisites
# =============================================================================

- name: Skip if NVIDIA disabled
  ansible.builtin.debug:
    msg: "NVIDIA GPU support disabled via nvidia_enabled={{ nvidia_enabled }}"
  when: not nvidia_enabled

- name: End play if NVIDIA disabled
  ansible.builtin.meta: end_host
  when: not nvidia_enabled

- name: Check for NVIDIA GPU
  ansible.builtin.shell: lspci | grep -i nvidia
  register: nvidia_gpu_check
  failed_when: false
  changed_when: false

- name: Skip if no NVIDIA GPU found
  ansible.builtin.debug:
    msg: "No NVIDIA GPU found, skipping NVIDIA setup"
  when: nvidia_gpu_check.rc != 0

- name: End play if no GPU
  ansible.builtin.meta: end_host
  when: nvidia_gpu_check.rc != 0

- name: Display detected GPU
  ansible.builtin.debug:
    msg: "Detected NVIDIA GPU: {{ nvidia_gpu_check.stdout }}"

# =============================================================================
# NVIDIA Driver Installation
# =============================================================================

- name: Check if nvidia kernel module is loaded and working
  ansible.builtin.shell: |
    modprobe nvidia 2>/dev/null || true
    cat /proc/driver/nvidia/version 2>/dev/null | grep -oP 'NVRM version: NVIDIA UNIX.*\K[0-9]+\.[0-9]+\.[0-9]+' | head -1
  register: nvidia_module_version
  failed_when: false
  changed_when: false

- name: Check if nvidia-smi binary exists
  ansible.builtin.stat:
    path: /usr/bin/nvidia-smi
  register: nvidia_smi_binary

- name: Check nvidia-smi version if it exists
  ansible.builtin.shell: nvidia-smi --version 2>/dev/null | grep -oP 'NVIDIA-SMI \K[0-9]+\.[0-9]+\.[0-9]+'
  register: nvidia_smi_version
  when: nvidia_smi_binary.stat.exists
  failed_when: false
  changed_when: false

- name: Set driver facts
  ansible.builtin.set_fact:
    nvidia_module_working: "{{ nvidia_module_version.rc == 0 and nvidia_module_version.stdout | length > 0 }}"
    nvidia_smi_working: "{{ nvidia_smi_binary.stat.exists and nvidia_smi_version.rc == 0 }}"
    driver_version_current: "{{ nvidia_module_version.stdout | default('none') | trim }}"
    smi_version_current: "{{ nvidia_smi_version.stdout | default('none') | trim }}"

- name: Display driver status
  ansible.builtin.debug:
    msg: |
      Kernel module version: {{ driver_version_current }}
      nvidia-smi version: {{ smi_version_current }}
      Module working: {{ nvidia_module_working }}
      nvidia-smi working: {{ nvidia_smi_working }}

# =============================================================================
# Install nvidia-smi if missing (Debian package issue workaround)
# =============================================================================

- name: Download NVIDIA driver for nvidia-smi extraction
  ansible.builtin.get_url:
    url: "{{ nvidia_driver_url }}"
    dest: /tmp/NVIDIA-driver.run
    mode: "0755"
  when: nvidia_module_working and not nvidia_smi_working

- name: Extract nvidia-smi from installer
  ansible.builtin.shell: |
    cd /tmp
    ./NVIDIA-driver.run --extract-only
    cp NVIDIA-Linux-x86_64-{{ nvidia_driver_version }}/nvidia-smi /usr/bin/
    chmod +x /usr/bin/nvidia-smi
    rm -rf NVIDIA-Linux-x86_64-{{ nvidia_driver_version }}
  when: nvidia_module_working and not nvidia_smi_working

- name: Clean up driver installer after extraction
  ansible.builtin.file:
    path: /tmp/NVIDIA-driver.run
    state: absent
  when: nvidia_module_working and not nvidia_smi_working

# =============================================================================
# Full driver installation (only if module not working)
# =============================================================================

- name: Install driver build dependencies
  ansible.builtin.apt:
    name:
      - build-essential
      - linux-headers-{{ ansible_facts['kernel'] }}
      - pkg-config
      - libglvnd-dev
      - dkms
    state: present
    update_cache: yes
  when: not nvidia_module_working

- name: Download NVIDIA driver
  ansible.builtin.get_url:
    url: "{{ nvidia_driver_url }}"
    dest: /tmp/NVIDIA-driver.run
    mode: "0755"
  when: not nvidia_module_working

- name: Stop display manager if running
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
  loop:
    - gdm
    - lightdm
    - sddm
  failed_when: false
  when: not nvidia_module_working

- name: Unload nouveau driver
  community.general.modprobe:
    name: nouveau
    state: absent
  failed_when: false
  when: not nvidia_module_working

- name: Install NVIDIA driver
  ansible.builtin.command: >
    /tmp/NVIDIA-driver.run
    --silent
    --dkms
    --no-questions
    --ui=none
  when: not nvidia_module_working
  register: driver_install

- name: Load nvidia kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - nvidia
    - nvidia_uvm
    - nvidia_modeset
  when: not nvidia_module_working

- name: Clean up driver installer
  ansible.builtin.file:
    path: /tmp/NVIDIA-driver.run
    state: absent
  when: not nvidia_module_working

# =============================================================================
# Verify driver is working
# =============================================================================

- name: Verify nvidia-smi works
  ansible.builtin.command: nvidia-smi
  register: nvidia_smi_verify
  changed_when: false

- name: Display GPU info
  ansible.builtin.debug:
    msg: "{{ nvidia_smi_verify.stdout }}"

# =============================================================================
# GPU Monitoring Tools
# =============================================================================

- name: Install nvtop for GPU monitoring
  ansible.builtin.apt:
    name: nvtop
    state: present

# =============================================================================
# NVIDIA Container Toolkit
# =============================================================================

- name: Add NVIDIA Container Toolkit GPG key
  ansible.builtin.shell: |
    curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | \
      gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
  args:
    creates: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg

- name: Add NVIDIA Container Toolkit repository
  ansible.builtin.shell: |
    curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | \
      sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' | \
      tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
  args:
    creates: /etc/apt/sources.list.d/nvidia-container-toolkit.list

- name: Install NVIDIA Container Toolkit
  ansible.builtin.apt:
    name: nvidia-container-toolkit
    state: present
    update_cache: yes

# =============================================================================
# Configure K3s containerd for NVIDIA runtime
# =============================================================================

- name: Symlink K3s runc to system PATH for nvidia-container-runtime
  ansible.builtin.file:
    src: /var/lib/rancher/k3s/data/current/bin/runc
    dest: /usr/local/bin/runc
    state: link
    force: yes

# NOTE: GPU Operator's toolkit DaemonSet will handle containerd configuration
# We keep our template for reference but GPU Operator will manage the runtime config

# =============================================================================
# NVIDIA GPU Operator
# =============================================================================

- name: Add NVIDIA Helm repository
  kubernetes.core.helm_repository:
    name: nvidia
    repo_url: https://helm.ngc.nvidia.com/nvidia

- name: Deploy NVIDIA GPU Operator
  kubernetes.core.helm:
    name: gpu-operator
    chart_ref: nvidia/gpu-operator
    release_namespace: gpu-operator
    create_namespace: yes
    kubeconfig: "{{ k3s_kubeconfig }}"
    values:
      # Use pre-installed driver on host
      driver:
        enabled: false

      # Enable toolkit to configure containerd
      toolkit:
        enabled: true
        env:
          - name: CONTAINERD_CONFIG
            value: /var/lib/rancher/k3s/agent/etc/containerd/config.toml.tmpl
          - name: CONTAINERD_SOCKET
            value: /run/k3s/containerd/containerd.sock
          - name: CONTAINERD_RUNTIME_CLASS
            value: nvidia
          - name: CONTAINERD_SET_AS_DEFAULT
            value: "false"

      # Operator configuration
      operator:
        # Use runc runtime for operator pods (not nvidia)
        # to avoid chicken-and-egg NVML initialization issue where
        # nvidia runtime tries to initialize NVML before GPU access is available
        runtimeClass: "runc"

      # Validator configuration
      validator:
        # Disable validator since it fails with pre-installed drivers
        # (can't find nvidia-smi when running with runc runtime)
        enabled: false

      # Enable device plugin
      devicePlugin:
        enabled: true

      # Disable components we don't need
      migManager:
        enabled: false
      gfd:
        enabled: true
      dcgm:
        enabled: false
      dcgmExporter:
        enabled: false

      # Node feature discovery (required for GPU node labeling)
      nfd:
        enabled: true

- name: Wait for GPU Operator toolkit to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: DaemonSet
    name: nvidia-container-toolkit-daemonset
    namespace: gpu-operator
    kubeconfig: "{{ k3s_kubeconfig }}"
  register: toolkit_status
  until: toolkit_status.resources[0].status.numberReady | default(0) > 0
  retries: 60
  delay: 10

- name: Create toolkit-ready validation file
  ansible.builtin.copy:
    content: "TOOLKIT_READY=true\n"
    dest: /run/nvidia/validations/toolkit-ready
    mode: "0644"
  when: toolkit_status.resources[0].status.numberReady | default(0) > 0

- name: Wait for GPU Operator device plugin to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: DaemonSet
    name: nvidia-device-plugin-daemonset
    namespace: gpu-operator
    kubeconfig: "{{ k3s_kubeconfig }}"
  register: device_plugin_status
  until: device_plugin_status.resources[0].status.numberReady | default(0) > 0
  retries: 60
  delay: 10

- name: Verify GPU is visible to Kubernetes
  ansible.builtin.shell: |
    kubectl get nodes -o json | jq -r '.items[].status.allocatable["nvidia.com/gpu"] // "0"'
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig }}"
  register: k8s_gpu_check
  changed_when: false
  failed_when: k8s_gpu_check.stdout | int < 1

- name: Display K8s GPU status
  ansible.builtin.debug:
    msg: "Kubernetes sees {{ k8s_gpu_check.stdout }} NVIDIA GPU(s)"
