---
# Cilium CNI role - installs Cilium for NetworkPolicy support
# Replaces Flannel (k3s must be started with --flannel-backend=none)

- name: Add Cilium Helm repository
  kubernetes.core.helm_repository:
    name: cilium
    repo_url: https://helm.cilium.io/
    kubeconfig: "{{ k3s_kubeconfig }}"

- name: Check if Cilium is already installed
  kubernetes.core.helm_info:
    name: cilium
    release_namespace: kube-system
    kubeconfig: "{{ k3s_kubeconfig }}"
  register: cilium_release
  ignore_errors: yes

- name: Install Cilium
  kubernetes.core.helm:
    name: cilium
    chart_ref: cilium/cilium
    chart_version: "{{ cilium_version }}"
    release_namespace: kube-system
    create_namespace: yes
    kubeconfig: "{{ k3s_kubeconfig }}"
    values:
      # k3s-specific settings
      operator:
        replicas: 1
      # Disable kube-proxy replacement - let k3s kube-proxy handle services
      # This is more conservative and avoids connectivity issues
      kubeProxyReplacement: "false"
      # Enable Hubble for observability (optional but useful)
      hubble:
        enabled: true
        relay:
          enabled: true
        ui:
          enabled: false  # Can enable later if needed
      # IPAM - use k3s cluster CIDR
      ipam:
        operator:
          clusterPoolIPv4PodCIDRList:
            - "10.42.0.0/16"
      # Explicitly set MTU to avoid auto-detection picking up tailscale0's low MTU (1280)
      # Use 1450 = 1500 (physical interface) - 50 (VXLAN overhead)
      # This is critical for TLS 1.3 with post-quantum key exchange (X25519MLKEM768)
      # which has ~1200 byte key shares that don't fit in 1280 MTU
      MTU: 1450
  when: cilium_release.status is not defined or cilium_release.status.status != "deployed"

- name: Wait for Cilium to be ready
  ansible.builtin.shell: |
    export KUBECONFIG={{ k3s_kubeconfig }}
    kubectl -n kube-system wait --for=condition=Ready pod -l app.kubernetes.io/name=cilium-agent --timeout=300s
  register: cilium_ready
  retries: 5
  delay: 15
  until: cilium_ready.rc == 0
  changed_when: false

- name: Verify Cilium status
  ansible.builtin.shell: |
    export KUBECONFIG={{ k3s_kubeconfig }}
    kubectl -n kube-system get pods -l app.kubernetes.io/part-of=cilium -o wide
  register: cilium_pods
  changed_when: false

- name: Display Cilium pods
  ansible.builtin.debug:
    var: cilium_pods.stdout_lines

- name: Wait for node to be ready (CNI installed)
  ansible.builtin.shell: |
    export KUBECONFIG={{ k3s_kubeconfig }}
    kubectl wait --for=condition=Ready node --all --timeout=300s
  register: node_ready
  retries: 5
  delay: 15
  until: node_ready.rc == 0
  changed_when: false
