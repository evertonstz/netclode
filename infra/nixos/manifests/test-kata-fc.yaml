---
# Test pod running in a Firecracker microVM
apiVersion: v1
kind: Pod
metadata:
  name: test-kata-fc
  labels:
    app: test-kata-fc
spec:
  runtimeClassName: kata-fc
  containers:
  - name: busybox
    image: busybox:latest
    command: ["sleep", "infinity"]
    resources:
      limits:
        memory: "128Mi"
        cpu: "100m"
