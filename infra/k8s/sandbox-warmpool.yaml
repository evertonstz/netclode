# SandboxWarmPool keeps pre-warmed sandboxes ready for fast session creation
# When a SandboxClaim is created, a warm sandbox is immediately assigned
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxWarmPool
metadata:
  name: netclode-agent-pool
  namespace: netclode
spec:
  replicas: 1  # Keep 1 warm sandbox ready
  sandboxTemplateRef:
    name: netclode-agent
