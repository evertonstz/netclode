# JuiceFS Storage Configuration
#
# Secret is created by scripts/deploy-secrets.sh
# Run: ./scripts/deploy-secrets.sh
#
---
# StorageClass for JuiceFS CSI
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: juicefs-sc
provisioner: csi.juicefs.com
parameters:
  csi.storage.k8s.io/provisioner-secret-name: juicefs-secret
  csi.storage.k8s.io/provisioner-secret-namespace: netclode
  csi.storage.k8s.io/node-publish-secret-name: juicefs-secret
  csi.storage.k8s.io/node-publish-secret-namespace: netclode
reclaimPolicy: Delete
volumeBindingMode: Immediate
allowVolumeExpansion: true
