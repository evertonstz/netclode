# JuiceFS Storage Configuration
#
# Prerequisites:
# 1. Install JuiceFS CSI driver:
#    helm repo add juicefs https://juicedata.github.io/charts/
#    helm install juicefs-csi juicefs/juicefs-csi-driver -n kube-system
#
# 2. Apply the JuiceFS CSI config (removes default CPU requests from mount pods):
#    kubectl apply -f juicefs-config.yaml
#    kubectl rollout restart statefulset juicefs-csi-controller -n kube-system
#
# 3. Create the juicefs-secret in netclode namespace with:
#    - name: filesystem name
#    - metaurl: redis://redis-juicefs.netclode.svc.cluster.local:6379/0
#    - storage: s3 (or other object storage type)
#    - bucket: bucket URL
#    - access-key: object storage access key
#    - secret-key: object storage secret key
#
# Secret is created by scripts/deploy-secrets.sh
# Run: ./scripts/deploy-secrets.sh
#
---
# StorageClass for JuiceFS CSI
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: juicefs-sc
provisioner: csi.juicefs.com
parameters:
  csi.storage.k8s.io/provisioner-secret-name: juicefs-secret
  csi.storage.k8s.io/provisioner-secret-namespace: netclode
  csi.storage.k8s.io/node-publish-secret-name: juicefs-secret
  csi.storage.k8s.io/node-publish-secret-namespace: netclode
reclaimPolicy: Delete
volumeBindingMode: Immediate
allowVolumeExpansion: true
