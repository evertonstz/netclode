# DaemonSet to pre-pull agent images on all nodes
# This ensures containers start faster by having images cached locally
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: image-prepull
  namespace: netclode
  labels:
    app: image-prepull
spec:
  selector:
    matchLabels:
      app: image-prepull
  template:
    metadata:
      labels:
        app: image-prepull
    spec:
      # Run on all nodes including those with Kata runtime
      tolerations:
        - operator: Exists
      initContainers:
        # Pull agent image
        - name: pull-agent
          image: ghcr.io/angristan/netclode-agent:latest
          imagePullPolicy: Always
          command: ["sh", "-c", "echo 'Image pulled successfully'"]
          resources:
            requests:
              cpu: "1m"
              memory: "1Mi"
            limits:
              cpu: "10m"
              memory: "10Mi"
      containers:
        # Pause container to keep pod running
        - name: pause
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: "1m"
              memory: "1Mi"
            limits:
              cpu: "10m"
              memory: "10Mi"
