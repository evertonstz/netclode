---
# Agent session pod template
# Control plane creates pods from this template for each session
# Using Kata runtime for microVM isolation
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-pod-template
  namespace: netclode
data:
  template.yaml: |
    apiVersion: v1
    kind: Pod
    metadata:
      name: "session-${SESSION_ID}"
      namespace: netclode
      labels:
        app: agent
        netclode.io/session: "${SESSION_ID}"
    spec:
      runtimeClassName: kata-fc  # Firecracker microVM
      restartPolicy: Never
      terminationGracePeriodSeconds: 30
      containers:
        - name: agent
          image: ghcr.io/netclode/agent:latest
          workingDir: /workspace
          ports:
            - containerPort: 3002
              name: http
          env:
            - name: SESSION_ID
              value: "${SESSION_ID}"
            - name: WORKSPACE_PATH
              value: "/workspace"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic-credentials
                  key: ANTHROPIC_API_KEY
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: "session-${SESSION_ID}-workspace"
---
# PVC template for session workspace
apiVersion: v1
kind: ConfigMap
metadata:
  name: session-pvc-template
  namespace: netclode
data:
  template.yaml: |
    apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: "session-${SESSION_ID}-workspace"
      namespace: netclode
      labels:
        app: agent
        netclode.io/session: "${SESSION_ID}"
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
      # storageClassName: juicefs-sc  # Enable when JuiceFS CSI is configured
