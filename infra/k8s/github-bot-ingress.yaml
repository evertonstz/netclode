# GitHub Bot Ingress - Exposed publicly via Tailscale Funnel
# This receives GitHub webhook events from the public internet.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: github-bot
  namespace: netclode
  annotations:
    tailscale.com/funnel: "true"
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: github-bot
      port:
        number: 80
