apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: netclode

resources:
  - namespace.yaml
  - control-plane.yaml
  - agent-sandbox-template.yaml

# Images can be overridden with:
# kustomize edit set image ghcr.io/netclode/control-plane=my-registry/control-plane:v1
images:
  - name: ghcr.io/netclode/control-plane
    newTag: latest
  - name: ghcr.io/netclode/agent
    newTag: latest
